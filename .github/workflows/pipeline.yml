name: Chess Pipeline

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual trigger from GitHub UI

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Stockfish 18
        run: |
          wget -q https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar
          tar -xf stockfish-ubuntu-x86-64-avx2.tar
          sudo mv stockfish/stockfish-ubuntu-x86-64-avx2 /usr/local/bin/stockfish
          sudo chmod +x /usr/local/bin/stockfish
          stockfish --version

      - name: Check DB port
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import os, re
          url = os.environ.get('DATABASE_URL', '')
          port = re.search(r':(\d+)/', url)
          print(f'Port: {port.group(1) if port else \"not found\"}')
          "

      - name: Import Chess.com games
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/import_chesscom.py

      - name: Import Lichess games
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/import_lichess.py

      - name: Match repertoire
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/match_repertoire.py

      - name: Analyze blunders
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/analyze_blunders.py

      - name: Import opponent games
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline/import_opponent_games.py